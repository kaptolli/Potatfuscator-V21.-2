<!DOCTYPE html><html lang="ru"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>POTATFUSCATOR | V21 PARADOX</title>    <style>        :root { --accent: #3498db; --glass: rgba(5, 12, 25, 0.85); }        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow-x: hidden; font-family: 'Consolas', monospace; }                #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #050a16 0%, #000 100%); z-index: -2; }        #rainCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }        .wrapper { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }                /* Увеличенное и адаптивное окно */        .container {             width: 100%; max-width: 480px; background: var(--glass); border: 1px solid rgba(52, 152, 219, 0.25);             box-shadow: 0 0 70px rgba(0,0,0,0.8); padding: 35px; border-radius: 35px;             text-align: center; color: #fff; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);        }        h1 { font-size: 11px; letter-spacing: 10px; margin-bottom: 25px; color: var(--accent); text-transform: uppercase; }                textarea {             width: 100%; height: 130px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(52, 152, 219, 0.2);             color: #85c1e9; padding: 15px; font-size: 12px; border-radius: 15px; outline: none; resize: none;             margin-bottom: 20px; box-sizing: border-box; font-family: 'Consolas', monospace;        }        button {             width: 100%; background: #fff; color: #000; border: none; padding: 18px;             font-weight: 900; border-radius: 15px; cursor: pointer; margin-bottom: 12px;             text-transform: uppercase; font-size: 11px; transition: 0.3s;        }        button:hover { background: var(--accent); color: #fff; transform: scale(1.02); }        .label-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 10px; color: #3498db; }        input[type=range] { width: 100%; accent-color: var(--accent); margin-bottom: 20px; cursor: pointer; }                .status-bar { margin-top: 20px; font-size: 9px; color: #2e4469; text-transform: uppercase; letter-spacing: 4px; }        .copy-btn { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid #444; }    </style></head><body>    <div id="bg"></div>    <canvas id="rainCanvas"></canvas>    <div class="wrapper">        <div class="container">            <h1>PARADOX V21</h1>            <div class="label-row"><span>SCRAMBLE POWER</span><span id="junkVal">400</span></div>            <input type="range" id="junkRange" min="100" max="1500" value="400">            <textarea id="input" placeholder="-- Paste Lua script..."></textarea>            <button onclick="obfuscate()">Generate Paradox VM</button>            <button class="copy-btn" onclick="copyCode()">Copy to Clipboard</button>            <textarea id="output" readonly placeholder="Result..."></textarea>            <div class="status-bar" id="status">Proxy Tables | Dead Branches | V21</div>        </div>    </div>    <script>        const canvas = document.getElementById('rainCanvas');        const ctx = canvas.getContext('2d');        let w, h, drops = [];        function init() {             w = canvas.width = window.innerWidth;             h = canvas.height = window.innerHeight;             drops = [];            for (let i = 0; i < 150; i++) drops.push({x: Math.random()*w, y: Math.random()*h, l: Math.random()*30, v: Math.random()*15+8, o: Math.random()*0.4});        }        function draw() {             ctx.clearRect(0,0,w,h);             drops.forEach(d => {                ctx.strokeStyle = `rgba(52, 152, 219, ${d.o})`;                ctx.lineWidth = 1.5;                ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.l); ctx.stroke();                d.y += d.v; if(d.y > h) d.y = -30;            });            requestAnimationFrame(draw);        }        window.onresize = init; init(); draw();        function hideN(n) {            const r = Math.floor(Math.random() * 99) + 1;            return `(((${n + r})-${r})*1)`;        }        function genSym() { return "_" + Math.random().toString(36).substring(2, 10); }        function obfuscate() {            let code = document.getElementById('input').value;            if(!code) return;            const k1 = Math.floor(Math.random() * 250) + 5;            const k2 = Math.floor(Math.random() * 250) + 5;                        // Превращаем код в байты            const utf8 = unescape(encodeURIComponent(code));            let bytes = [];            for (let i = 0; i < utf8.length; i++) bytes.push(utf8.charCodeAt(i) ^ ((k1 + i) % 256) ^ k2);            const junkSize = parseInt(document.getElementById('junkRange').value);            let landfill = Array.from({length: junkSize}, () => hideN(Math.floor(Math.random() * 255)));            let map = [];            let pool = Array.from({length: junkSize}, (_, i) => i);            bytes.forEach(b => {                let idx = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];                landfill[idx] = hideN(b);                map.push(hideN(idx + 1));            });            // Имена для Proxy Tables и Dead Code            const proxyT = genSym();            const deadF = genSym();            const vT = genSym();             const mT = genSym();             const kT = genSym();            let res = `--[[Картошка смеётся над тобой грязный скиддер]]\n`;                        // --- PROXY TABLE ---            res += `local ${proxyT} = { [${hideN(101)}] = string.char, [${hideN(102)}] = load, [${hideN(103)}] = pcall, [${hideN(104)}] = os.clock }; `;                        // --- DEAD CODE ---            res += `local function ${deadF}(...) local a = { ... } local b = 0 for i=1,#a do b = b + i end return b end; `;                        res += `local ${vT}={${landfill.join(',')}}; `;            res += `local ${mT}={${map.join(',')}}; `;            res += `local ${kT}={${hideN(k1)},${hideN(k2)}}; `;                        // VM            res += `local function run(t,m,k)                 local _s = ${proxyT}[${hideN(104)}]()                local o, _i = "", 0                 for p=1,#m do                     o = o .. ${proxyT}[${hideN(101)}](t[m[p]] ~ k[2] ~ ((k[1]+_i)%256))                     _i = _i + 1                     if _i % 500 == 0 then ${deadF}(o) end                end                 if ${proxyT}[${hideN(104)}]() - _s > 1.5 then return nil end                return o             end; `;                        res += `local ok, err = ${proxyT}[${hideN(103)}](function()                 local r = run(${vT}, ${mT}, ${kT})                if r then ${proxyT}[${hideN(102)}](r)() end            end); `;            document.getElementById('output').value = res.replace(/\s+/g, ' ');            document.getElementById('status').innerText = "V21 PARADOX | READY";        }        function copyCode() { const o = document.getElementById('output'); o.select(); document.execCommand('copy'); }    </script></body></html>
